
name: Build and upload to S3
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
permissions:
  id-token: write
  contents: read
 
env:
  AWS_REGION: ap-south-2
  S3_BUCKET: lab-<account-id>-artifacts
 
jobs:
  build-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Create deployment zip
        run: |
          zip -r app-${{ github.sha }}.zip . \
            -x '*.git*' -x 'node_modules/.cache/*' -x '.github/*'
          ls -lh app-${{ github.sha }}.zip
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::030179310796:role/Github_actions
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Upload artifact to S3
        run: |
          aws s3 cp app-${{ github.sha }}.zip \
          s3://${{ env.S3_BUCKET }}/builds/app-${{ github.sha }}.zip